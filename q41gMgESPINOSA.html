<!DOCTYPE html>
<html>
<head>
<title>Movie Ratings</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{
width:420px;
margin:auto;
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

label{
font-weight:bold;
}

select{
width:100%;
padding:8px;
margin:6px 0 12px 0;
}

button{
width:100%;
padding:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.star{
font-size:26px;
color:gray;
cursor:pointer;
}

.star.active{
color:gold;
}

.movie{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h2>Movie Ratings</h2>

<form id="movieForm">

<label>Movie Title</label>
<select id="title">
<option>Harry Potter and the Sorcerer's Stone</option>
<option>Harry Potter and the Chamber of Secrets</option>
<option>Harry Potter and the Prisoner of Azkaban</option>
<option>Harry Potter and the Goblet of Fire</option>
<option>Harry Potter and the Order of the Phoenix</option>
<option>Harry Potter and the Half-Blood Prince</option>
<option>Harry Potter and the Deathly Hallows Part 1</option>
<option>Harry Potter and the Deathly Hallows Part 2</option>
</select>

<label>Year</label>
<select id="year">
<option>2001</option>
<option>2002</option>
<option>2004</option>
<option>2005</option>
<option>2007</option>
<option>2009</option>
<option>2010</option>
<option>2011</option>
</select>

<label>Genre</label>
<select id="genre">
<option>Fantasy</option>
<option>Adventure</option>
<option>Action</option>
<option>Drama</option>
</select>

<label>Rating</label><br>

<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>

<input type="hidden" id="rating">

<br><br>

<button type="button" onclick="addMovie()">Add Movie</button>

</form>

<h3>Movie List</h3>
<div id="movieList"></div>

</div>

<script>

let stars=document.querySelectorAll(".star")

function setRating(num){

document.getElementById("rating").value=num

stars.forEach((star,index)=>{
if(index<num){
star.classList.add("active")
}else{
star.classList.remove("active")
}
})

}

function addMovie(){

let movie={
title:document.getElementById("title").value,
year:document.getElementById("year").value,
genre:document.getElementById("genre").value,
rating:document.getElementById("rating").value
}

let movies=JSON.parse(localStorage.getItem("movies")) || []

movies.push(movie)

localStorage.setItem("movies",JSON.stringify(movies))

displayMovies()

document.getElementById("movieForm").reset()

stars.forEach(star=>star.classList.remove("active"))

}

function displayMovies(){

let movies=JSON.parse(localStorage.getItem("movies")) || []

let list=document.getElementById("movieList")

list.innerHTML=""

movies.forEach(function(movie){

let starDisplay=""

for(let i=0;i<movie.rating;i++){
starDisplay+="⭐"
}

list.innerHTML+=`
<div class="movie">
<b>${movie.title}</b> (${movie.year})<br>
Genre: ${movie.genre}<br>
Rating: ${starDisplay}
</div>
`

})

}

displayMovies()

</script>

</body>
</html>
