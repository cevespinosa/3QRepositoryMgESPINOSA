<!DOCTYPE html>
<html>
<head>
<title>Movie Ratings</title>
<style>
body{
  font-family:Arial;
  background:#f5f5f5;
}
.container{
  width:420px;
  margin:auto;
  margin-top:40px;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}
h2{text-align:center;}
label{font-weight:bold;}
input, select{width:100%; padding:8px; margin:6px 0 12px 0;}
button{
  width:100%;
  padding:10px;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.star{
  font-size:26px;
  color:gray;
  cursor:pointer;
}
.star.active{color:gold;}
.movie{
  background:#eee;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}
.deleteBtn{
  background:red;
  color:white;
  border:none;
  padding:5px;
  margin-top:5px;
  cursor:pointer;
  border-radius:4px;
}
</style>
</head>
<body>

<div class="container">
<h2>Movie Ratings</h2>

<form id="movieForm">
<label>Movie Title</label>
<select id="title">
  <option>Harry Potter and the Sorcerer's Stone</option>
  <option>Harry Potter and the Chamber of Secrets</option>
  <option>Avengers: Endgame</option>
  <option>Avengers: Infinity War</option>
  <option>Spider-Man: No Way Home</option>
  <option>The Flash</option>
  <option>Guardians of the Galaxy</option>
  <option>Black Panther</option>
</select>

<label>Year</label>
<input type="number" id="year" placeholder="Enter year">

<label>Genre</label>
<select id="genre">
  <option>Fantasy</option>
  <option>Adventure</option>
  <option>Action</option>
  <option>Drama</option>
</select>

<label>Rating</label><br>
<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>

<input type="hidden" id="rating">
<br><br>
<button type="button" onclick="addMovie()">Add Movie</button>
</form>

<h3>Movie List</h3>
<div id="movieList"></div>
</div>

<script>

let stars=document.querySelectorAll(".star")

function setRating(num){
  document.getElementById("rating").value=num
  stars.forEach((star,index)=>{
    if(index<num){ star.classList.add("active") }
    else{ star.classList.remove("active") }
  })
}

function addMovie(){

  let title=document.getElementById("title").value
  let year=document.getElementById("year").value
  let genre=document.getElementById("genre").value
  let rating=parseInt(document.getElementById("rating").value)

  let movies=JSON.parse(localStorage.getItem("movies")) || []

  let found=false

  for(let i=0;i<movies.length;i++){
    if(movies[i].title===title){

      let oldRating=parseInt(movies[i].rating)
      let newRating=Math.round((oldRating + rating)/2)

      movies[i].rating=newRating
      movies[i].year=year
      movies[i].genre=genre

      found=true
      break
    }
  }

  if(!found){
    let movie={
      title:title,
      year:year,
      genre:genre,
      rating:rating
    }
    movies.push(movie)
  }

  localStorage.setItem("movies",JSON.stringify(movies))

  displayMovies()

  document.getElementById("movieForm").reset()
  stars.forEach(star=>star.classList.remove("active"))
}

function deleteMovie(index){

  let confirmDelete=confirm("Are you sure you want to delete this movie?")

  if(confirmDelete){
    let movies=JSON.parse(localStorage.getItem("movies")) || []
    movies.splice(index,1)
    localStorage.setItem("movies",JSON.stringify(movies))
    displayMovies()
  }
}

function displayMovies(){

  let movies=JSON.parse(localStorage.getItem("movies")) || []

  let list=document.getElementById("movieList")
  list.innerHTML=""

  movies.forEach(function(movie,index){

    let starsDisplay=""
    for(let i=0;i<movie.rating;i++){
      starsDisplay+="⭐"
    }

    list.innerHTML+=`
    <div class="movie">
      <b>${movie.title}</b> (${movie.year})<br>
      Genre: ${movie.genre}<br>
      Rating: ${starsDisplay}<br>
      <button class="deleteBtn" onclick="deleteMovie(${index})">Delete</button>
    </div>`
  })
}

displayMovies()

</script>

</body>
</html>
